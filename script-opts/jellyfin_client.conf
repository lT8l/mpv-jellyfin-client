# Jellyfin server URL.
# Required.
# Default: empty
# Examples:
#   url=https://jellyfin.example.com
#   url=http://192.168.1.40:8096/jellyfin
# A trailing slash is allowed; the script removes it automatically.
url=

# Directory used to cache downloaded subtitle files.
# Default: empty, which uses mpv's cache/state directory.
# Examples:
#   cache_path=/tmp/mpv-jellyfin
#   cache_path=C:\Users\you\AppData\Local\Temp\mpv-jellyfin
cache_path=

# Open the Jellyfin menu automatically when the script starts.
# Values:
#   on     show at start
#   empty  wait for Ctrl+j
# Default: empty
show_by_default=

# Open the Jellyfin menu when mpv becomes idle after playback ends.
# Requires mpv to keep the window open, for example with --idle.
# Values:
#   on     show on idle
#   empty  do nothing
# Default: empty
show_on_idle=

# Maximum number of latest items shown per library on the root menu.
# This affects only the root menu's "latest" sections.
# Values: any integer 1 or greater
# Default: 9
# Example:
#   home_latest_limit=12
home_latest_limit=9
